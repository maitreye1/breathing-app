<html lang="ko"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>나의 호흡 측정기 🌸</title>
<style>
  :root { color-scheme: light; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
    background: linear-gradient(135deg, #fef9f0 0%, #f0f7ff 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px;
    color: #2d2d2d;
  }

  h1 {
    font-size: 1.4rem;
    font-weight: 700;
    color: #3a3a5c;
    margin-bottom: 4px;
    text-align: center;
  }

  .subtitle {
    font-size: 0.85rem;
    color: #888;
    margin-bottom: 28px;
    text-align: center;
  }

  /* Guide */
  .guide {
    background: white;
    border-radius: 16px;
    padding: 14px 18px;
    margin-bottom: 24px;
    width: 100%;
    max-width: 380px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.07);
    font-size: 0.82rem;
    color: #555;
    line-height: 1.7;
  }
  .guide strong { color: #5b73e8; }

  /* Main button */
  .btn-wrap {
    position: relative;
    margin-bottom: 28px;
    user-select: none;
    -webkit-user-select: none;
  }

  #breathBtn {
    width: 160px;
    height: 160px;
    border-radius: 50%;
    border: none;
    background: linear-gradient(145deg, #ffb3c6, #ff758c);
    box-shadow: 0 8px 32px rgba(255,100,130,0.35);
    font-size: 3.5rem;
    cursor: pointer;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    outline: none;
    -webkit-tap-highlight-color: transparent;
  }

  #breathBtn.holding {
    transform: scale(1.12);
    box-shadow: 0 12px 40px rgba(255,100,130,0.5);
    background: linear-gradient(145deg, #ffd6e0, #ff9aad);
  }

  .phase-label {
    text-align: center;
    font-size: 1rem;
    font-weight: 600;
    color: #555;
    margin-top: 10px;
    min-height: 24px;
    transition: color 0.2s;
  }

  .phase-label.inhale { color: #27ae60; }
  .phase-label.exhale { color: #2980b9; }

  /* Timer display */
  .timer-display {
    font-size: 2.2rem;
    font-weight: 700;
    color: #3a3a5c;
    text-align: center;
    min-height: 48px;
    margin-bottom: 8px;
    letter-spacing: -1px;
  }

  /* Count badge */
  .count-badge {
    text-align: center;
    font-size: 0.82rem;
    color: #aaa;
    margin-bottom: 24px;
  }

  /* Bar chart */
  .chart-section {
    width: 100%;
    max-width: 380px;
    background: white;
    border-radius: 16px;
    padding: 16px 18px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.07);
    margin-bottom: 20px;
  }

  .chart-title {
    font-size: 0.85rem;
    font-weight: 600;
    color: #555;
    margin-bottom: 12px;
  }

  .bars-container {
    display: flex;
    flex-direction: column;
    gap: 8px;
    min-height: 60px;
  }

  .bar-row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.75rem;
    color: #777;
  }

  .bar-label { width: 28px; flex-shrink: 0; }

  .bar-track {
    flex: 1;
    background: #f0f0f0;
    border-radius: 6px;
    height: 18px;
    overflow: hidden;
    position: relative;
  }

  .bar-fill {
    height: 100%;
    border-radius: 6px;
    transition: width 0.3s ease;
    min-width: 4px;
  }

  .bar-fill.inhale { background: linear-gradient(90deg, #6bcb8e, #27ae60); }
  .bar-fill.exhale { background: linear-gradient(90deg, #5dade2, #2980b9); }

  .bar-val { width: 36px; flex-shrink: 0; text-align: right; }

  .empty-msg {
    font-size: 0.8rem;
    color: #ccc;
    text-align: center;
    padding: 12px 0;
  }

  /* Action buttons */
  .action-btns {
    display: flex;
    gap: 12px;
    width: 100%;
    max-width: 380px;
    margin-bottom: 20px;
  }

  .action-btn {
    flex: 1;
    padding: 12px;
    border: none;
    border-radius: 12px;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
  }

  .action-btn:active { transform: scale(0.97); }
  .action-btn:disabled { opacity: 0.35; cursor: not-allowed; }

  #analyzeBtn {
    background: linear-gradient(135deg, #5b73e8, #7c5ce4);
    color: white;
  }

  #resetBtn {
    background: #f0f0f0;
    color: #555;
  }

  /* Result panel */
  .result-panel {
    display: none;
    width: 100%;
    max-width: 380px;
    background: white;
    border-radius: 16px;
    padding: 18px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.07);
    margin-bottom: 20px;
  }

  .result-panel.show { display: block; }

  .result-title {
    font-size: 0.95rem;
    font-weight: 700;
    color: #3a3a5c;
    margin-bottom: 14px;
    border-bottom: 1px solid #f0f0f0;
    padding-bottom: 8px;
  }

  .result-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 8px 0;
    border-bottom: 1px solid #f9f9f9;
    font-size: 0.83rem;
  }

  .result-row:last-child { border-bottom: none; }

  .result-key { color: #888; flex-shrink: 0; margin-right: 12px; }
  .result-val { font-weight: 600; color: #3a3a5c; text-align: right; }

  .recommend-box {
    background: linear-gradient(135deg, #eef2ff, #f5f0ff);
    border-radius: 12px;
    padding: 14px;
    margin-top: 14px;
  }

  .recommend-box .rec-title {
    font-size: 0.82rem;
    font-weight: 700;
    color: #5b73e8;
    margin-bottom: 8px;
  }

  .recommend-box p {
    font-size: 0.8rem;
    color: #555;
    line-height: 1.6;
  }

  .legend {
    display: flex;
    gap: 16px;
    font-size: 0.75rem;
    color: #888;
    margin-bottom: 10px;
  }

  .legend-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    display: inline-block;
    margin-right: 4px;
    vertical-align: middle;
  }

  .dot-green { background: #27ae60; }
  .dot-blue { background: #2980b9; }
</style>
</head>
<body>

<h1>🌸 나의 호흡 측정기</h1>
<p class="subtitle">내 숨이 얼마나 길까? 직접 확인해봐요!</p>

<div class="guide">
  <strong>사용법</strong><br>
  🌸 꽃을 <strong>꾸욱 누르고</strong> → 숨을 들이마세요<br>
  ✋ 손을 <strong>떼면</strong> → 숨을 내쉬어요<br>
  3번 이상 반복 후 <strong>"분석 보기"</strong>를 눌러보세요
</div>

<div class="timer-display" id="timerDisplay">19.0s</div>

<div class="btn-wrap">
  <button id="breathBtn" title="누르고 있으면 들숨, 떼면 날숨" class="">🌸</button>
</div>

<div class="phase-label exhale" id="phaseLabel">💨 내쉬는 중...</div>
<div class="count-badge" id="countBadge">측정 3회</div>

<div class="chart-section">
  <div class="legend">
    <span><span class="legend-dot dot-green"></span>들숨</span>
    <span><span class="legend-dot dot-blue"></span>날숨</span>
  </div>
  <div class="chart-title">회차별 호흡 길이</div>
  <div class="bars-container" id="barsContainer">
        <div class="bar-row">
          <span class="bar-label">1회</span>
          <div style="flex:1; display:flex; flex-direction:column; gap:3px;">
            <div class="bar-track">
              <div class="bar-fill inhale" style="width:3.7%"></div>
            </div>
            <div class="bar-track">
              <div class="bar-fill exhale" style="width:84.1%"></div>
            </div>
          </div>
          <span class="bar-val">0.1s<br>1.1s</span>
        </div>
      
        <div class="bar-row">
          <span class="bar-label">2회</span>
          <div style="flex:1; display:flex; flex-direction:column; gap:3px;">
            <div class="bar-track">
              <div class="bar-fill inhale" style="width:5.5%"></div>
            </div>
            <div class="bar-track">
              <div class="bar-fill exhale" style="width:100.0%"></div>
            </div>
          </div>
          <span class="bar-val">0.1s<br>1.4s</span>
        </div>
      
        <div class="bar-row">
          <span class="bar-label">3회</span>
          <div style="flex:1; display:flex; flex-direction:column; gap:3px;">
            <div class="bar-track">
              <div class="bar-fill inhale" style="width:5.5%"></div>
            </div>
            <div class="bar-track">
              <div class="bar-fill exhale" style="width:0%"></div>
            </div>
          </div>
          <span class="bar-val">0.1s<br>—</span>
        </div>
      </div>
</div>

<div class="action-btns">
  <button class="action-btn" id="analyzeBtn">분석 보기</button>
  <button class="action-btn" id="resetBtn">다시 측정</button>
</div>

<div class="result-panel" id="resultPanel">
  <div class="result-title">📊 호흡 분석 결과</div>

  <div class="result-row">
    <span class="result-key">평균 들숨 시간</span>
    <span class="result-val" id="avgInhale">—</span>
  </div>
  <div class="result-row">
    <span class="result-key">평균 날숨 시간</span>
    <span class="result-val" id="avgExhale">—</span>
  </div>
  <div class="result-row">
    <span class="result-key">들숨 : 날숨 비율</span>
    <span class="result-val" id="ratio">—</span>
  </div>
  <div class="result-row">
    <span class="result-key">분당 호흡 수 (예측)</span>
    <span class="result-val" id="bpm">—</span>
  </div>
  <div class="result-row">
    <span class="result-key">호흡 유형</span>
    <span class="result-val" id="breathType">—</span>
  </div>

  <div class="recommend-box">
    <div class="rec-title">🧘 명상 호흡 권장 가이드</div>
    <p id="recommend">—</p>
  </div>
</div>

<script>
  const btn = document.getElementById('breathBtn');
  const phaseLabel = document.getElementById('phaseLabel');
  const timerDisplay = document.getElementById('timerDisplay');
  const countBadge = document.getElementById('countBadge');
  const barsContainer = document.getElementById('barsContainer');
  const analyzeBtn = document.getElementById('analyzeBtn');
  const resetBtn = document.getElementById('resetBtn');
  const resultPanel = document.getElementById('resultPanel');

  let state = 'idle'; // idle | inhaling | exhaling
  let pressStart = 0;
  let releaseStart = 0;
  let timerRaf = null;

  let records = []; // [{inhale, exhale}]
  let currentInhale = 0;

  function fmt(ms) {
    return (ms / 1000).toFixed(1) + 's';
  }

  function startTimer(fromMs) {
    timerRaf && cancelAnimationFrame(timerRaf);
    function tick() {
      const elapsed = Date.now() - fromMs;
      timerDisplay.textContent = (elapsed / 1000).toFixed(1) + 's';
      timerRaf = requestAnimationFrame(tick);
    }
    tick();
  }

  function stopTimer() {
    timerRaf && cancelAnimationFrame(timerRaf);
    timerRaf = null;
  }

  function onPress() {
    // If was exhaling, finish that exhale
    if (state === 'exhaling') {
      const exhaleDur = Date.now() - releaseStart;
      if (records.length > 0) {
        records[records.length - 1].exhale = exhaleDur;
      }
      renderBars();
    }

    state = 'inhaling';
    pressStart = Date.now();
    btn.classList.add('holding');
    phaseLabel.className = 'phase-label inhale';
    phaseLabel.textContent = '🌱 들이마시는 중...';
    startTimer(pressStart);
  }

  function onRelease() {
    if (state !== 'inhaling') return;
    const inhaleDur = Date.now() - pressStart;
    currentInhale = inhaleDur;

    state = 'exhaling';
    releaseStart = Date.now();
    btn.classList.remove('holding');
    phaseLabel.className = 'phase-label exhale';
    phaseLabel.textContent = '💨 내쉬는 중...';

    // Push new record with placeholder exhale
    records.push({ inhale: inhaleDur, exhale: null });
    countBadge.textContent = `측정 ${records.length}회`;
    if (records.length >= 3) analyzeBtn.disabled = false;

    startTimer(releaseStart);
    renderBars();
  }

  // Pointer events for press/release
  btn.addEventListener('pointerdown', (e) => { e.preventDefault(); onPress(); });
  btn.addEventListener('pointerup', (e) => { e.preventDefault(); onRelease(); });
  btn.addEventListener('pointerleave', (e) => { if (state === 'inhaling') onRelease(); });

  function renderBars() {
    if (records.length === 0) {
      barsContainer.innerHTML = '<div class="empty-msg">아직 측정 기록이 없어요 🌿</div>';
      return;
    }

    // Max for scaling
    const allVals = records.flatMap(r => [r.inhale, r.exhale || 0]).filter(Boolean);
    const maxVal = Math.max(...allVals, 1);

    let html = '';
    records.forEach((r, i) => {
      const inhaleW = (r.inhale / maxVal * 100).toFixed(1);
      const exhaleW = r.exhale ? (r.exhale / maxVal * 100).toFixed(1) : 0;
      html += `
        <div class="bar-row">
          <span class="bar-label">${i + 1}회</span>
          <div style="flex:1; display:flex; flex-direction:column; gap:3px;">
            <div class="bar-track">
              <div class="bar-fill inhale" style="width:${inhaleW}%"></div>
            </div>
            <div class="bar-track">
              <div class="bar-fill exhale" style="width:${exhaleW}%"></div>
            </div>
          </div>
          <span class="bar-val">${fmt(r.inhale)}<br>${r.exhale ? fmt(r.exhale) : '—'}</span>
        </div>
      `;
    });

    barsContainer.innerHTML = html;
  }

  analyzeBtn.addEventListener('click', () => {
    // Complete last exhale if still going
    if (state === 'exhaling' && records.length > 0 && records[records.length-1].exhale === null) {
      records[records.length-1].exhale = Date.now() - releaseStart;
      stopTimer();
      state = 'idle';
      phaseLabel.className = 'phase-label';
      phaseLabel.textContent = '분석 결과를 확인하세요!';
      timerDisplay.textContent = '—';
    }

    const complete = records.filter(r => r.inhale && r.exhale);
    if (complete.length < 1) return;

    const avgIn = complete.reduce((s,r) => s + r.inhale, 0) / complete.length;
    const avgEx = complete.reduce((s,r) => s + r.exhale, 0) / complete.length;
    const cycleMs = avgIn + avgEx;
    const bpmVal = (60000 / cycleMs).toFixed(1);
    const ratioNum = (avgEx / avgIn).toFixed(2);

    document.getElementById('avgInhale').textContent = fmt(avgIn);
    document.getElementById('avgExhale').textContent = fmt(avgEx);
    document.getElementById('ratio').textContent = `1 : ${ratioNum}`;
    document.getElementById('bpm').textContent = `분당 ${bpmVal}회`;

    // Classify
    let typeText, rec;
    const ratio = avgEx / avgIn;
    const cycleS = cycleMs / 1000;

    if (cycleS < 5) {
      typeText = '빠른 호흡 (활발한 상태)';
      rec = `지금은 숨이 조금 빠른 편이에요. 4초 들이마시고 4초 내쉬는 박자로 천천히 시작해봐요. 꽃잎이 피어나는 것처럼 천천히!`;
    } else if (cycleS < 10) {
      typeText = '보통 호흡 (안정된 상태)';
      rec = `호흡이 안정되어 있어요! 들숨을 ${Math.round(avgIn/1000)+1}초, 날숨을 ${Math.round(avgEx/1000)+1}초로 조금씩 늘려보세요. 명상 효과가 높아져요.`;
    } else {
      typeText = '깊은 호흡 (차분한 상태)';
      rec = `와, 정말 깊고 차분한 호흡이에요! 이 속도를 그대로 유지하면서 호흡에 집중해보세요. 명상에 딱 좋은 호흡이에요. 🌟`;
    }

    if (ratio > 1.5) {
      typeText += ' · 날숨이 긴 편';
      rec += ' 날숨이 들숨보다 길어서 마음이 더 차분해지는 효과가 있어요.';
    } else if (ratio < 0.7) {
      typeText += ' · 들숨이 긴 편';
      rec += ' 날숨을 들숨보다 조금 더 길게 내쉬면 마음이 더 가라앉아요.';
    }

    const recommendedIn = Math.max(4, Math.round(avgIn / 1000));
    const recommendedEx = Math.max(5, Math.round(avgEx / 1000) + 1);
    rec += `\n\n✨ 권장 명상 호흡: 들숨 ${recommendedIn}초 → 날숨 ${recommendedEx}초`;

    document.getElementById('breathType').textContent = typeText;
    document.getElementById('recommend').textContent = rec;

    resultPanel.classList.add('show');
    resultPanel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    renderBars();
  });

  resetBtn.addEventListener('click', () => {
    stopTimer();
    state = 'idle';
    pressStart = 0;
    releaseStart = 0;
    currentInhale = 0;
    records = [];
    btn.classList.remove('holding');
    phaseLabel.className = 'phase-label';
    phaseLabel.textContent = '꽃을 꾸욱 눌러보세요!';
    timerDisplay.textContent = '0.0s';
    countBadge.textContent = '측정 0회';
    analyzeBtn.disabled = true;
    resultPanel.classList.remove('show');
    renderBars();
  });
</script>


</body></html>
